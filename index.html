<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Westmoreland Transit Ticket</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #fff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center; 
    font-family: 'DM Sans', sans-serif;
  }

  img{
    width: 180px;
  }
  /* Main edge-to-edge container */
  .app-view {
    width: 100%;
    max-width: 400px;
    background: transparent; 
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
    padding-bottom: 24px; 

  }

  /* Close Bar */
  .close-bar {
    text-align: right;
    padding: 12px 16px;
    font-size: 20px;
    color: #000;
    font-weight: 400;
    background: transparent; 
    margin-top: 10px;
    margin-right: 10px;
    margin-bottom: -5px; 
  }

  /* Main container for everything else */
  .ticket-wrapper {
    background: #fdfdfd;
    border-radius: 10px; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
    overflow: hidden; 
    width: calc(100% - 32px); 
    margin: 0 auto; 
  }

  /* Ticket Header */
  .ticket-header {
    background: #5c2a7a;
    padding: 8px 16px;
    text-align: center;
  }

  .ticket-header span {
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  /* QR Code Area */
  .qr-area {
    padding: 30px 20px;
    display: flex;
    justify-content: center;
    background: #fff;
  }

  .qr-svg {
    width: 240px;
    height: 240px;
    shape-rendering: crispEdges; 
  }

  /* Wrapper for the 3 interior sections */
  .details-wrapper {
    padding: 0 20px;
  }

  /* Time Bar Container */
  .time-bar-wrapper {
    position: relative;
    height: 48px;
    overflow: hidden;
    margin: 0; 
    border-top-left-radius: 8px;
    border-top-right-radius: 8px;
  }

  .time-bar-inner {
    display: flex;
    height: 100%;
    width: 100%;
  }

  /* Tri-color background matching the screenshot */
  .seg-1 { background: #B1A271; flex: 1; }
  .seg-2 { background: #3E9798; flex: 1; }
  .seg-3 { background: #45FB3B; flex: 1; }

  .time-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
  }

  /* Animated Time Text with Drop Shadow */
  .time-text {
    position: absolute;
    top: 0; /* Removed the 50% top */
    line-height: 48px; /* Mathematically centers the text based on container height */
    color: #fff;
    font-size: 24px;
    font-weight: 600;
    white-space: nowrap;
    
    text-shadow: 
      0px 1px 4px rgba(0,0,0,0.8),
      0px 2px 8px rgba(0,0,0,0.9),
      0px 0px 2px rgba(0,0,0,1);
    
    animation: slideRight 2s ease-in-out infinite alternate;
    
    /* Hardware acceleration & anti-blur hints */
    will-change: left, transform;
    backface-visibility: hidden;
    -webkit-font-smoothing: antialiased;
    transform: translateZ(0);
  }

  /* Keyframes now only handle horizontal movement, eliminating sub-pixel vertical rendering */
  @keyframes slideRight {
    0% {
      left: 0;
      transform: translate3d(0, 0, 0); 
    }
    100% {
      left: 100%;
      transform: translate3d(-100%, 0, 0);
    }
  }

  /* Branding Area */
  .branding-area {
    background: linear-gradient(to bottom, #d5d3d8, #c1bec4);
    padding: 0px 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 140px;
    margin: 0; 
  }

  .wt-logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0.25;
  }

  .wt-name {
    font-size: 11px;
    color: #5c2a7a;
    font-style: italic;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* Activated Bar */
  .activated-bar {
    background: #b5121b;
    padding: 5px 16px;
    text-align: center;
    margin-bottom: 65px; 
    border-bottom-left-radius: 8px;
    border-bottom-right-radius: 8px;
  }

  .activated-bar span {
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.2px;
  }

  /* Bottom Area Spacer */
  .spacer {
    flex-grow: 1;
    min-height: 20px; 
  }

  /* Bottom Nav */
  .nav-divider {
    border-top: 2px dotted #ccc;
    margin: 12px 0; 
  }

  .bottom-nav {
    display: flex;
    justify-content: space-between;
    padding: 0 24px 24px;
  }

  .nav-btn {
    color: #007AFF;
    font-size: 16px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }

  .nav-btn svg {
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="app-view">

  <div class="close-bar">Close</div>

  <div class="ticket-wrapper">
    <div class="ticket-header">
      <span>One way Single - Zone 3</span>
    </div>

    <div class="qr-area">
      <img src="qr1.jpg" id="qr-frame-1" />
      <img src="qr2.png" id="qr-frame-2"  style="display: none;" />
    </div>

    <div class="details-wrapper">
      
      <div class="time-bar-wrapper">
        <div class="time-bar-inner">
          <div class="seg-1"></div>
          <div class="seg-2"></div>
          <div class="seg-3"></div>
        </div>
        <div class="time-overlay">
          <span class="time-text" id="live-time"></span>
        </div>
      </div>

      <div class="branding-area">
        <div class="wt-logo">
          <img src="wt.png" />
        </div>
      </div>

      <div class="activated-bar">
        <span id="activated-time">Activated</span>
      </div>

    </div> <div class="spacer"></div>

    <div class="nav-divider"></div>
    <div class="bottom-nav">
      <div class="nav-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <circle cx="4" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="20" cy="12" r="1"/>
        </svg>
        Actions
      </div>
      <div class="nav-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <circle cx="3.5" cy="6" r="1" fill="currentColor"/><circle cx="3.5" cy="12" r="1" fill="currentColor"/><circle cx="3.5" cy="18" r="1" fill="currentColor"/>
        </svg>
        Details
      </div>
    </div>
  </div> </div> <script>
  // --- Script 1: Live System Time & Activated Time ---
  function updateLiveTime() {
    const timeElement = document.getElementById('live-time');
    const activatedElement = document.getElementById('activated-time');
    
    if (!timeElement) return;

    const now = new Date();

    let hours = now.getHours();
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12;
    hours = hours ? hours : 12; 

    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    const month = String(now.getMonth() + 1).padStart(2, '0'); 
    const day = String(now.getDate()).padStart(2, '0');
    const year = now.getFullYear();

    timeElement.textContent = `${hours}:${minutes}:${seconds} ${ampm} ${month}/${day}/${year}`;

    if (activatedElement) {
      const activatedDate = new Date(now.getTime() - 60000); 
      let actHours = activatedDate.getHours();
      const actAmPm = actHours >= 12 ? 'PM' : 'AM';
      actHours = actHours % 12;
      actHours = actHours ? actHours : 12;
      const actMinutes = String(activatedDate.getMinutes()).padStart(2, '0');
      
      activatedElement.textContent = `Activated ${actHours}:${actMinutes} ${actAmPm}`;
    }
  }

  updateLiveTime();
  setInterval(updateLiveTime, 1000);

  // --- Script 2: Toggle QR Code Frames Every 3 Seconds ---
  function toggleQRCode() {
    const frame1 = document.getElementById('qr-frame-1');
    const frame2 = document.getElementById('qr-frame-2');
    
    if (frame1.style.display === 'none') {
      frame1.style.display = 'block';
      frame2.style.display = 'none';
    } else {
      frame1.style.display = 'none';
      frame2.style.display = 'block';
    }
  }

  setInterval(toggleQRCode, 3000);
</script>

</body>
</html>
