<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Westmoreland Transit Ticket</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #e0ddd8;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center; 
    font-family: 'DM Sans', sans-serif;
  }

  /* Main edge-to-edge container */
  .app-view {
    width: 100%;
    max-width: 400px;
    background: transparent; 
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    padding-bottom: 24px; 
    /* Ensures no height restriction on the interface */
    height: auto; 
  }

  /* Close Bar */
  .close-bar {
    text-align: right;
    padding: 12px 16px;
    font-size: 16px;
    color: #000;
    font-weight: 400;
    background: transparent; 
    margin-top: 10px;
    margin-right: 10px;
    margin-bottom: -5px; 
  }

  /* Main container for everything else */
  .ticket-wrapper {
    background: #fdfdfd;
    border-radius: 18px; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
    overflow: hidden; 
    width: calc(100% - 32px); 
    margin: 0 auto; 
  }

  /* Ticket Header */
  .ticket-header {
    background: #5c2a7a;
    padding: 14px 16px;
    text-align: center;
  }

  .ticket-header span {
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  /* QR Code Area */
  .qr-area {
    padding: 30px 20px;
    display: flex;
    justify-content: center;
    background: #fff;
  }

  .qr-svg {
    width: 240px;
    height: 240px;
    shape-rendering: crispEdges; 
  }

  /* Wrapper for the 3 interior sections */
  .details-wrapper {
    padding: 0 20px;
  }

  /* Time Bar Container */
  .time-bar-wrapper {
    position: relative;
    height: 48px;
    overflow: hidden;
    margin: 0; 
    border-top-left-radius: 8px;
    border-top-right-radius: 8px;
  }

  .time-bar-inner {
    display: flex;
    height: 100%;
    width: 100%;
  }

  /* Tri-color background matching the screenshot */
  .seg-1 { background: #B1A271; flex: 1; }
  .seg-2 { background: #3E9798; flex: 1; }
  .seg-3 { background: #45FB3B; flex: 1; }

  .time-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
  }

  /* Animated Time Text with Drop Shadow */
  .time-text {
    position: absolute;
    top: 50%;
    color: #fff;
    font-size: 20px;
    font-weight: 600;
    white-space: nowrap;
    
    /* Heavy, multi-layered text shadow for maximum contrast */
    text-shadow: 
      0px 1px 4px rgba(0,0,0,0.8),
      0px 2px 8px rgba(0,0,0,0.9),
      0px 0px 2px rgba(0,0,0,1);
    
    /* The Animation */
    animation: slideRight 4s linear infinite alternate;
  }

  @keyframes slideRight {
    0% {
      left: 0;
      transform: translate(0, -50%);
    }
    100% {
      left: 100%;
      transform: translate(-100%, -50%);
    }
  }

  /* Branding Area */
  .branding-area {
    background: linear-gradient(to bottom, #d5d3d8, #c1bec4);
    padding: 40px 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 140px;
    margin: 0; 
  }

  .wt-logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0.25;
  }

  .wt-name {
    font-size: 11px;
    color: #5c2a7a;
    font-style: italic;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* Activated Bar */
  .activated-bar {
    background: #b5121b;
    padding: 14px 16px;
    text-align: center;
    margin: 0; 
    border-bottom-left-radius: 8px;
    border-bottom-right-radius: 8px;
  }

  .activated-bar span {
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.2px;
  }

  /* Bottom Area Spacer */
  .spacer {
    flex-grow: 1;
    min-height: 20px; 
  }

  /* Bottom Nav */
  .nav-divider {
    border-top: 2px dotted #ccc;
    margin: 12px 0; 
  }

  .bottom-nav {
    display: flex;
    justify-content: space-between;
    padding: 0 24px 24px;
  }

  .nav-btn {
    color: #007AFF;
    font-size: 16px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }

  .nav-btn svg {
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="app-view">

    </div>

    <div class="qr-area">

        <rect width="45" height="45" fill="white"/>

                stroke-dasharray="1,1,2,1,3,1,1,2,2,1,1,3,1,2,1,1,2,1,3,1,2"/>
          <path d="M2.5,15.5 h12 M31.5,15.5 h11 M2.5,16.5 h12 M31.5,16.5 h11 M2.5,17.5 h12 M31.5,17.5 h11 M2.5,18.5 h12 M31.5,18.5 h11 M2.5,19.5 h12 M31.5,19.5 h11 M2.5,20.5 h12 M31.5,20.5 h11 M2.5,21.5 h12 M31.5,21.5 h11 M2.5,22.5 h12 M31.5,22.5 h11 M2.5,23.5 h12 M31.5,23.5 h11 M2.5,24.5 h12 M31.5,24.5 h11 M2.5,25.5 h12 M31.5,25.5 h11 M2.5,26.5 h12 M31.5,26.5 h11 M2.5,27.5 h12 M31.5,27.5 h11 M2.5,28.5 h12 M31.5,28.5 h11 M2.5,29.5 h12 M31.5,29.5 h11" 
                stroke-dasharray="2,2,1,1,1,3,1,1"/>
          <path d="M2.5,30.5 h40 M2.5,31.5 h40 M2.5,32.5 h40 M2.5,33.5 h40 M2.5,34.5 h40 M2.5,35.5 h40 M2.5,36.5 h40 M2.5,37.5 h40 M2.5,38.5 h40 M2.5,39.5 h40 M2.5,40.5 h40 M2.5,41.5 h40 M2.5,42.5 h40" 
                stroke-dasharray="3,1,2,1,1,2,1,2,2,1,1,2,1,1,1,3,1,1,2,1,1"/>
        </g>

        <g id="qr-frame-2" stroke="black" stroke-width="1" style="display: none;">
          <path d="M2.5,2.5 h40 M2.5,3.5 h40 M2.5,4.5 h40 M2.5,5.5 h40 M2.5,6.5 h40 M2.5,7.5 h40 M2.5,8.5 h40 M2.5,9.5 h40 M2.5,10.5 h40 M2.5,11.5 h40 M2.5,12.5 h40 M2.5,13.5 h40 M2.5,14.5 h40" 
                stroke-dasharray="2,1,3,1,1,1,2,3,1,2,1,1,2,1,2,1,1,3,1,2,2"/>
          <path d="M2.5,15.5 h12 M31.5,15.5 h11 M2.5,16.5 h12 M31.5,16.5 h11 M2.5,17.5 h12 M31.5,17.5 h11 M2.5,18.5 h12 M31.5,18.5 h11 M2.5,19.5 h12 M31.5,19.5 h11 M2.5,20.5 h12 M31.5,20.5 h11 M2.5,21.5 h12 M31.5,21.5 h11 M2.5,22.5 h12 M31.5,22.5 h11 M2.5,23.5 h12 M31.5,23.5 h11 M2.5,24.5 h12 M31.5,24.5 h11 M2.5,25.5 h12 M31.5,25.5 h11 M2.5,26.5 h12 M31.5,26.5 h11 M2.5,27.5 h12 M31.5,27.5 h11 M2.5,28.5 h12 M31.5,28.5 h11 M2.5,29.5 h12 M31.5,29.5 h11" 
                stroke-dasharray="1,2,2,1,1,1,2,1,3"/>
          <path d="M2.5,30.5 h40 M2.5,31.5 h40 M2.5,32.5 h40 M2.5,33.5 h40 M2.5,34.5 h40 M2.5,35.5 h40 M2.5,36.5 h40 M2.5,37.5 h40 M2.5,38.5 h40 M2.5,39.5 h40 M2.5,40.5 h40 M2.5,41.5 h40 M2.5,42.5 h40" 
                stroke-dasharray="1,1,2,3,2,1,1,1,2,1,3,1,1,2,1,2,1,1,3,1,2"/>
        </g>
      </svg>
    </div>

    <div class="details-wrapper">
      
      <div class="time-bar-wrapper">
        <div class="time-bar-inner">
          <div class="seg-1"></div>
          <div class="seg-2"></div>
          <div class="seg-3"></div>
        </div>
        <div class="time-overlay">
          <span class="time-text" id="live-time"></span>
        </div>
      </div>

      <div class="branding-area">
        <div class="wt-logo">
          <svg width="100" height="46" viewBox="0 0 90 46" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polyline points="4,8 16,38 26,18 36,38 48,8" fill="none" stroke="#5c2a7a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="58" y1="8" x2="86" y2="8" stroke="#5c2a7a" stroke-width="6" stroke-linecap="round"/>
            <line x1="72" y1="8" x2="62" y2="38" stroke="#5c2a7a" stroke-width="6" stroke-linecap="round"/>

          <span class="wt-name">Westmoreland Transit</span>
        </div>
      </div>

      <div class="activated-bar">
        <span id="activated-time">Activated</span>
      </div>

    </div> <div class="spacer"></div>

    <div class="nav-divider"></div>
    <div class="bottom-nav">
      <div class="nav-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <circle cx="4" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="20" cy="12" r="1"/>
        </svg>
        Actions
      </div>

        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <circle cx="3.5" cy="6" r="1" fill="currentColor"/><circle cx="3.5" cy="12" r="1" fill="currentColor"/><circle cx="3.5" cy="18" r="1" fill="currentColor"/>
        </svg>
        Details
      </div>
    </div>
  </div> </div> <script>
  // --- Script 1: Live System Time & Activated Time ---
  function updateLiveTime() {
    const timeElement = document.getElementById('live-time');
    const activatedElement = document.getElementById('activated-time');
    
    if (!timeElement) return;

    const now = new Date();

    let hours = now.getHours();
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12;
    hours = hours ? hours : 12; 

    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    const month = String(now.getMonth() + 1).padStart(2, '0'); 
    const day = String(now.getDate()).padStart(2, '0');
    const year = now.getFullYear();

    timeElement.textContent = `${hours}:${minutes}:${seconds} ${ampm} ${month}/${day}/${year}`;

    if (activatedElement) {
      const activatedDate = new Date(now.getTime() - 60000); 
      let actHours = activatedDate.getHours();
      const actAmPm = actHours >= 12 ? 'PM' : 'AM';
      actHours = actHours % 12;
      actHours = actHours ? actHours : 12;
      const actMinutes = String(activatedDate.getMinutes()).padStart(2, '0');
      
      activatedElement.textContent = `Activated ${actHours}:${actMinutes} ${actAmPm}`;
    }
  }

  updateLiveTime();
  setInterval(updateLiveTime, 1000);

  // --- Script 2: Toggle QR Code Frames Every 3 Seconds ---
  function toggleQRCode() {
    const frame1 = document.getElementById('qr-frame-1');
    const frame2 = document.getElementById('qr-frame-2');
    
    if (frame1.style.display === 'none') {
      frame1.style.display = 'block';
      frame2.style.display = 'none';
    } else {
      frame1.style.display = 'none';
      frame2.style.display = 'block';
    }
  }

  setInterval(toggleQRCode, 3000);
</script>

</body>
</html>
